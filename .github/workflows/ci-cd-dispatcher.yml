name: ⚙️ CI/CD Dispatcher (Public)

on:
  # Allow manual dispatch with a buildType input
  workflow_dispatch:
    inputs:
      buildType:
        description: "Build type: 'preview' for manual/dev builds, 'release_candidate' for staging (e.g., v1.2.3-rc.1), 'release' for production (e.g., v1.2.3)"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - release_candidate
          - release
      skipTests:
        description: "Whether tests should be skipped"
        required: true
        default: "default"
        type: choice
        options:
          - "default"
          - "true"
          - "false"
      deployTargets:
        description: 'JSON array of deploy targets (e.g. ["itch.io","s3"])'
        required: true
        default: '["gh-pages"]'
        type: string
      buildTargets:
        description: 'JSON array of build targets (e.g. ["WebGL","iOS"])'
        required: true
        default: '["WebGL"]'
        type: string
      buildVersion:
        description: Optional version override
        type: string
        required: false
  # Automatically run tests & builds on certain branches or PR changes
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # matches v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+" # matches v1.2.3-rc.1
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - "Tests/**"
  pull_request:
    types: [ready_for_review, synchronize, reopened]
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - "Tests/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve_runners:
    name: Resolve Runner Labels
    runs-on: ubuntu-latest
    outputs:
      main: ${{ steps.resolve.outputs.main }}
      macos: ${{ steps.resolve.outputs.macos }}
    steps:
      - name: Resolve runners
        id: resolve
        uses: avalin/unity-ci-cd/.github/actions/resolve-runners@main
        with:
          main: ${{ vars.MAIN_RUNNER }}
          macos: ${{ vars.MACOS_RUNNER }}
        env:
          GH_TOKEN: ${{ secrets.CICD_PAT }}

  validation:
    name: Check Skip CI triggers
    needs:
      - resolve_runners
    runs-on: ${{ needs.resolve_runners.outputs.main }}
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check last commit for [skip ci]
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Last commit message: $COMMIT_MSG"

          if [[ "$COMMIT_MSG" == *"[skip ci]"* || "$COMMIT_MSG" == *"[ci skip]"* ]]; then
            echo "Skipping CI as requested."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Proceeding with CI."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Required GitHub Secrets
        run: |
          REQUIRED_SECRETS=("CICD_PAT" "UNITY_EMAIL" "UNITY_LICENSE" "UNITY_PASSWORD")
          MISSING=0

          for SECRET_NAME in "${REQUIRED_SECRETS[@]}"; do
            VALUE_VAR="SECRET_${SECRET_NAME}"
            VALUE="${!VALUE_VAR}"

            if [[ -z "$VALUE" || "$VALUE" == "" ]]; then
              echo "❌ Required secret '$SECRET_NAME' is not set!"
              MISSING=1
            else
              echo "✅ Secret '$SECRET_NAME' is present."
            fi
          done

          if [[ "$MISSING" -eq 1 ]]; then
            echo "❌ One or more required secrets are missing. Failing..."
            exit 1
          fi
        env:
          SECRET_CICD_PAT: ${{ secrets.CICD_PAT }}
          SECRET_UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          SECRET_UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          SECRET_UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

  prepare_metadata:
    name: Prepare Metadata
    needs:
      - resolve_runners
      - validation
    if: ${{ needs.validation.outputs.should_run == 'true'}}
    uses: avalin/unity-ci-cd/.github/workflows/prepare-metadata.yml@main
    with:
      runnerMain: ${{ needs.resolve_runners.outputs.main }}
      runnerMacos: ${{ needs.resolve_runners.outputs.macos }}
      unityVersion: ${{ vars.UNITY_VERSION }}
      projectName: ${{ vars.PROJECT_NAME }}
      skipTests: ${{ inputs.skipTests }}
      deployTargets: ${{ inputs.deployTargets }}
      buildTargets: ${{ inputs.buildTargets }}
      buildType: ${{ inputs.buildType }}
      buildVersion: ${{ inputs.buildVersion }}

  tagging:
    name: Create or Verify Tag
    needs:
      - validation
      - resolve_runners
      - prepare_metadata
    if: ${{ needs.validation.outputs.should_run == 'true'}}
    uses: avalin/unity-ci-cd/.github/workflows/build-version-tagger.yml@main
    with:
      runnerMain: ${{ needs.resolve_runners.outputs.main }}
      buildType: ${{ needs.prepare_metadata.outputs.buildType }}
      buildVersion: ${{ needs.prepare_metadata.outputs.buildVersion }}

  trigger_ci:
    name: Trigger CI/CD Pipeline
    needs: [resolve_runners, validation, tagging, prepare_metadata]
    if: ${{ needs.validation.outputs.should_run == 'true' }}
    uses: ./.github/workflows/ci-cd-pipeline.yml
    with:
      runnerMain: ${{ needs.resolve_runners.outputs.main }}
      runnerMacos: ${{ needs.resolve_runners.outputs.macos }}
      buildTargets: ${{ needs.prepare_metadata.outputs.buildTargets }}
      validDeployTargets: ${{ needs.prepare_metadata.outputs.validDeployTargets }}
      # Aqui passamos os JSONs que você estava montando com o JQ
      metadataConfig: |
        {
          "projectName": "${{ needs.prepare_metadata.outputs.projectName }}",
          "skipTests": "${{ needs.prepare_metadata.outputs.skipTests }}",
          "testsOnly": "${{ needs.prepare_metadata.outputs.testsOnly }}",
          "buildType": "${{ needs.prepare_metadata.outputs.buildType }}",
          "buildVersion": "${{ needs.prepare_metadata.outputs.buildVersion }}",
          "retentionDays": "${{ needs.prepare_metadata.outputs.retentionDays }}",
          "timeoutMinutesTests": "${{ needs.prepare_metadata.outputs.timeoutMinutesTests }}",
          "timeoutMinutesBuild": "${{ needs.prepare_metadata.outputs.timeoutMinutesBuild }}"
        }
      artifactConfig: |
        {
          "requiresCombined": "${{ needs.prepare_metadata.outputs.requiresCombined }}",
          "skipPerBuildTarget": "${{ needs.prepare_metadata.outputs.skipPerBuildTarget }}"
        }
      testDataConfig: |
        {
          "unityVersion": "${{ needs.prepare_metadata.outputs.unityVersion }}",
          "useGitLfs": "${{ needs.prepare_metadata.outputs.useGitLfs }}",
          "editModePath": "${{ needs.prepare_metadata.outputs.editModePath }}",
          "playModePath": "${{ needs.prepare_metadata.outputs.playModePath }}",
          "quietMode": "${{ needs.prepare_metadata.outputs.quietMode }}"
        }
    secrets: inherit
